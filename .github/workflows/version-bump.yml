name: Version Bump

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine bump type from commit message
        id: bump
        env:
          MSG: ${{ github.event.head_commit.message }}
        run: |
          if echo "$MSG" | grep -qiE "^(feat|feature)(\(.+\))?!:|BREAKING CHANGE"; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$MSG" | grep -qiE "^(feat|feature)"; then
            echo "type=minor" >> $GITHUB_OUTPUT
          elif echo "$MSG" | grep -qiE "^(fix|bugfix|patch|chore|docs|style|refactor)"; then
            echo "type=patch" >> $GITHUB_OUTPUT
          else
            echo "type=none" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        if: steps.bump.outputs.type != 'none'
        run: |
          BUMP="${{ steps.bump.outputs.type }}"
          CURRENT=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          IFS='.' read -r major minor patch <<< "$CURRENT"

          case "$BUMP" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          NEW="${major}.${minor}.${patch}"
          echo "Bumping $CURRENT -> $NEW ($BUMP)"

          python3 -c "
          import json
          for f in ['.claude-plugin/plugin.json', '.claude-plugin/marketplace.json']:
              with open(f) as fh:
                  data = json.load(fh)
              if 'version' in data:
                  data['version'] = '$NEW'
              if 'plugins' in data:
                  for p in data['plugins']:
                      p['version'] = '$NEW'
              with open(f, 'w') as fh:
                  json.dump(data, fh, indent=2)
                  fh.write('\n')
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: bump version to $NEW"
          git tag "v$NEW"
          git push origin main --tags
